# ============================================================
# Jekyll Chirpy config — fernando-meneses.github.io
# Gerado para o plano operacional AI Security (Dia 1, Sábado 18/04/2026)
# ============================================================

# --- Site identity -------------------------------------------
# 'lang: en' é importante: força o site inteiro em inglês.
# Todos os writeups são em inglês por decisão estratégica do plano.
lang: en
timezone: America/Sao_Paulo

title: Fernando Meneses
tagline: Physician + Developer → AI Security in Healthcare
description: >-
  Notes, experiments, and writeups from a physician learning
  AI security in public, with a focus on clinical AI systems.

# URL do seu site — GitHub Pages usa https://<usuario>.github.io por padrão.
# Se depois você comprar domínio próprio, troca aqui.
url: "https://fernando-meneses.github.io"

github:
  username: fernando-meneses   # ATENÇÃO: precisa bater com o usuário que você vai criar/usar no GitHub

# --- Author --------------------------------------------------
# Aparece no rodapé dos posts. Deixei 'social_preview' apontando
# pra um arquivo que você pode adicionar depois (não é bloqueante Dia 1).
social:
  name: Fernando Meneses
  email: ""                     # opcional — pode preencher depois
  links:
    - https://github.com/fernando-meneses
    # - https://twitter.com/SEU_HANDLE    # descomente quando criar o handle
    # - https://www.linkedin.com/in/SEU_LINKEDIN

# --- Theme appearance ----------------------------------------
# Chirpy tem dark/light/auto. 'auto' respeita o sistema do leitor.
theme_mode:                     # [light | dark | "" (auto)]

# Avatar aparece na sidebar. Adicione um arquivo em assets/img/avatar.jpg depois.
avatar: /assets/img/avatar.jpg

# --- Posts ---------------------------------------------------
paginate: 10                    # posts por página no index

# TOC lateral — um dos motivos de ter escolhido Chirpy.
# Writeups longos (1500-3000 palavras) ficam navegáveis.
toc: true

# Comentários — 'disqus' e 'giscus' são as opções.
# Giscus (usa GitHub Discussions) é o mais indicado pra blog técnico.
# Deixei vazio agora — configura na Semana 2-3, não é Dia 1.
comments:
  provider:                     # [disqus | utterances | giscus]

# --- Analytics -----------------------------------------------
# Não configurar no Dia 1. Discutir na primeira revisão mensal
# se vale a pena ou se privacidade dos leitores importa mais.
analytics:
  google:
    id:

# --- Defaults ------------------------------------------------
# Todo post novo já nasce com estas configurações — você não
# precisa repetir no frontmatter de cada arquivo.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      pin: false

# --- Build (não mexer até entender) --------------------------
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
